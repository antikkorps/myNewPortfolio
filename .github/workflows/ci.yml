name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Tests, lint, typecheck, format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Build first so the security suite (test/security.test.ts) can scan
      # build/client/assets for secret leaks. Without a build the scan is
      # skipped — making it useless on PRs, where it matters most.
      - name: Build
        run: npm run build

      - name: Unit + component tests
        run: npm test
